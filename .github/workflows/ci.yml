name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── Mobile TypeScript ──────────────────────────────────
      - name: Typecheck mobile
        run: npx tsc --noEmit

      # ── Backend TypeScript ─────────────────────────────────
      - name: Typecheck backend
        run: npx tsc --project tsconfig.backend.json --noEmit

      # ── Backend build ──────────────────────────────────────
      - name: Build backend
        run: npm run build:backend

      # ── Tests ─────────────────────────────────────────────
      - name: Run tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          # Stub values so config.ts validation doesn't throw in CI
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ci-stub
          EXPO_PUBLIC_SHUTTLER_API_URL: http://localhost:3000
          EXPO_PUBLIC_FIREBASE_API_KEY: ci-stub
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-stub
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ci-stub
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-stub
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ci-stub
          EXPO_PUBLIC_FIREBASE_APP_ID: ci-stub
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ci-stub
